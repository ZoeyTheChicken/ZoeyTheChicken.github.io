<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Confirm Update</title>
</head>
<body>

    <div class="overlay" id="popup">
        <div class="popup-container">
            <p>Are you sure you want to restart and update now?</p>
            <button class="yes-button" onclick="closePopup(true)">Yes</button>
            <button class="no-button" onclick="closePopup(true)">No</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
